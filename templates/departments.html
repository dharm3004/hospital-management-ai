{% extends 'base.html' %}

{% block title %}Departments - Hospital AI{% endblock %}

{% block content %}
<div class="container py-5">
  <h1 class="mb-4">Departments</h1>
  <div class="row g-4">
    {% for dept in departments %}
      <div class="col-md-4">
        <div class="card h-100">
          <div class="card-body text-center">
            <div class="mb-3"><i class="bi {{ dept.icon }} fs-1 text-primary"></i></div>
            <h5 class="card-title">{{ dept.name }}</h5>
            <p class="text-muted">{{ dept.desc }}</p>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
