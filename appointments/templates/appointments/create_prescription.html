{% extends 'base.html' %}

{% block title %}Create Prescription - Hospital AI{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card fade-in-up">
        <div class="card-body p-4">
          <h4 class="mb-3">Create Prescription for {{ appointment.patient.username }}</h4>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea name="notes" class="form-control" rows="5">{{ form.notes.value }}</textarea>
            </div>
            <div class="text-end">
              <button class="btn btn-primary">Save Prescription</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
