{% extends 'base.html' %}

{% block title %}Patient Profile - Hospital AI{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card fade-in-up">
        <div class="card-body p-4">
          <h4 class="mb-3">Edit Profile</h4>
          <form method="post">
            {% csrf_token %}
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First name</label>
                <input name="first_name" class="form-control" value="{{ request.user.first_name }}" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Last name</label>
                <input name="last_name" class="form-control" value="{{ request.user.last_name }}" />
              </div>
            </div>
            <div class="mt-3">
              <label class="form-label">Email</label>
              <input name="email" type="email" class="form-control" value="{{ request.user.email }}" />
            </div>
            <div class="mt-3">
              <label class="form-label">Blood Type</label>
              <input name="blood_type" class="form-control" value="{{ patient_profile.blood_type }}" />
            </div>
            <div class="mt-3">
              <label class="form-label">Allergies</label>
              <input name="allergies" class="form-control" value="{{ patient_profile.allergies }}" />
            </div>
            <div class="mt-3">
              <label class="form-label">Medical History</label>
              <textarea name="medical_history" class="form-control">{{ patient_profile.medical_history }}</textarea>
            </div>
            <div class="mt-4 text-end">
              <button class="btn btn-primary">Save Profile</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
