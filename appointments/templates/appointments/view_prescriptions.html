{% extends 'base.html' %}

{% block title %}Your Prescriptions - Hospital AI{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card fade-in-up">
        <div class="card-header">
          <h5 class="mb-0">Your Prescriptions</h5>
        </div>
        <div class="card-body">
          {% for p in prescriptions %}
            <div class="mb-3 border-bottom pb-2">
              <strong>{{ p.doctor.username }}</strong> — <small class="text-muted">{{ p.created_at|date:"M d, Y" }}</small>
              <div class="mt-2">{{ p.notes }}</div>
            </div>
          {% empty %}
            <p class="text-muted text-center">You have no prescriptions.</p>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
